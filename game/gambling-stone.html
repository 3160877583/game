*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0800;--card:#1a1208;--gold:#ffd700;--jade:#4dff4d;--red:#ff4444;--border:#3a2a15;--text:#e8d5b8;--dim:#8a7a6a}
body{background:var(--bg);color:var(--text);font-family:"Microsoft YaHei","PingFang SC",sans-serif;min-height:100vh;overflow-x:hidden}
.hdr{background:linear-gradient(135deg,#1a1008,#2a1a10,#1a1008);border-bottom:2px solid var(--gold);padding:10px 15px;position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center}
.hdr h1{font-size:20px;color:var(--gold);text-shadow:0 0 10px rgba(255,215,0,.4)}
.hdr .money{font-size:18px;color:var(--gold);font-weight:700}
.hdr .xpi{font-size:11px;color:var(--jade);margin-left:8px}
.tabs{display:flex;background:#15100a;border-bottom:2px solid var(--border);overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:55px;padding:10px 4px;text-align:center;font-size:12px;border:none;background:none;color:var(--dim);cursor:pointer;white-space:nowrap;transition:.2s}
.tab.active{color:var(--gold);border-bottom:2px solid var(--gold);background:rgba(255,215,0,.05)}
.pnl{display:none;padding:15px;max-width:900px;margin:0 auto}
.pnl.show{display:block}
h2{color:var(--gold);font-size:18px;margin-bottom:10px}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;transition:.2s}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;margin-top:10px}
.sp{width:65px;height:65px;border-radius:50%;margin:0 auto 8px;position:relative;overflow:hidden;background-size:cover;background-position:center;border:2px solid rgba(255,215,0,.3);box-shadow:inset 0 2px 8px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.3)}
.badge{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:700}
.b-c{background:#444;color:#aaa}.b-u{background:#1a4a1a;color:#4dff4d}.b-r{background:#1a3a6a;color:#4d8fff}
.b-e{background:#4a1a6a;color:#c44dff}.b-l{background:#5a4a0a;color:#ffd700}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.btn:active{transform:scale(.95)}
.btn-g{background:linear-gradient(135deg,var(--gold),#b8860b);color:#1a0a00}
.btn-g:hover{box-shadow:0 0 15px rgba(255,215,0,.3)}
.btn-j{background:linear-gradient(135deg,var(--jade),#2a8a2a);color:#0a1a00}
.btn-r{background:linear-gradient(135deg,#ff4444,#aa2222);color:#fff}
.btn-d{background:#333;color:#666;cursor:not-allowed}
.btn-s{padding:5px 12px;font-size:12px}
.btn-blk{display:block;width:100%;margin-top:8px}
.ov{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:200;justify-content:center;align-items:center;background:rgba(0,0,0,.88)}
.ov.show{display:flex}
.ov-box{background:#1a1208;border:2px solid var(--gold);border-radius:15px;padding:20px;max-width:380px;width:90%;text-align:center;animation:pop .4s}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
@keyframes shake{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 5px var(--gold)}50%{box-shadow:0 0 20px var(--gold)}}
.cut-area{text-align:center;padding:20px}
.cut-stone{display:inline-block;animation:shake .6s infinite;cursor:pointer}
.cut-bar{width:80%;max-width:350px;height:18px;background:#1a0a00;border:2px solid var(--border);border-radius:9px;margin:15px auto;overflow:hidden}
.cut-fill{height:100%;background:linear-gradient(90deg,var(--gold),#ff8c00);width:0%;transition:width .15s;border-radius:7px}

function makeStoneCanvas(baseR,baseG,baseB,accentR,accentG,accentB){
var cv=document.createElement('canvas');cv.width=120;cv.height=120;
var ctx=cv.getContext('2d');
var cx=60,cy=60;
var grd=ctx.createRadialGradient(cx-15,cy-15,5,cx,cy,65);
grd.addColorStop(0,'rgb('+Math.min(255,baseR+40)+','+Math.min(255,baseG+40)+','+Math.min(255,baseB+40)+')');
grd.addColorStop(0.6,'rgb('+baseR+','+baseG+','+baseB+')');
grd.addColorStop(1,'rgb('+Math.max(0,baseR-30)+','+Math.max(0,baseG-30)+','+Math.max(0,baseB-30)+')');
ctx.fillStyle=grd;ctx.beginPath();ctx.arc(cx,cy,60,0,Math.PI*2);ctx.fill();
for(var i=0;i<60;i++){var px=Math.random()*120,py=Math.random()*120;
var bright=Math.random()>.5;
ctx.fillStyle=bright?'rgba(255,255,255,'+(Math.random()*.12).toFixed(2)+')':'rgba(0,0,0,'+(Math.random()*.15).toFixed(2)+')';
ctx.beginPath();ctx.arc(px,py,1+Math.random()*4,0,Math.PI*2);ctx.fill()}
for(var i=0;i<8;i++){ctx.strokeStyle='rgba(0,0,0,'+(0.05+Math.random()*.1).toFixed(2)+')';
ctx.lineWidth=0.5+Math.random()*1.5;
ctx.beginPath();
var sx=Math.random()*120,sy=Math.random()*120;
ctx.moveTo(sx,sy);
for(var j=0;j<3;j++){sx+=(Math.random()-.5)*30;sy+=(Math.random()-.5)*30;ctx.lineTo(sx,sy)}
ctx.stroke()}
ctx.fillStyle='rgba('+accentR+','+accentG+','+accentB+',0.08)';
ctx.beginPath();ctx.ellipse(55,50,30,20,0.3,0,Math.PI*2);ctx.fill();
var hi=ctx.createRadialGradient(45,38,2,45,38,18);
hi.addColorStop(0,'rgba(255,255,255,0.12)');hi.addColorStop(1,'rgba(255,255,255,0)');
ctx.fillStyle=hi;ctx.beginPath();ctx.arc(45,38,18,0,Math.PI*2);ctx.fill();
return cv.toDataURL('image/png')}

function getSeason(){return SEASONS[G.season%SEASONS.length]}

// Generate a random stone
function genStone(tpl){
  var origin=ORIGINS[Math.floor(Math.random()*ORIGINS.length)];
  var skin=SKINS[Math.floor(Math.random()*SKINS.length)];
  var feats=[];for(var i=0;i<FEATS.length;i++){if(Math.random()<.3+G.skills.skin*.02)feats.push(FEATS[i])}
  var weight=tpl.wt[0]+Math.random()*(tpl.wt[1]-tpl.wt[0]);
  weight=Math.round(weight*10)/10;
  var price=Math.round(tpl.price*getSeason().mod.pm*(.8+Math.random()*.4));
  // Skills discount
  price=Math.max(10,Math.round(price*(1-G.skills.origin*.01)));
  return{id:"s_"+Date.now()+"_"+Math.random().toString(36).substr(2,4),name:tpl.name,origin:origin,skin:skin,feats:feats,weight:weight,price:price,tier:tpl.tier,desc:tpl.desc,revealed:0,gemIdx:-1,gemValue:0,carved:0,carveTheme:"",carveValue:0,bought:price}
}

function rollGem(tier){
  var gw=TIER_GW[Math.min(tier,TIER_GW.length-1)];
  var luck=1+G.skills.light*.03+getSeason().mod.lm;
  // Weighted random with luck bonus for higher gems
  var totalW=0;for(var i=0;i<gw.length;i++)totalW+=gw[i].w;
  var r=Math.random()*totalW;
  for(var i=0;i<gw.length;i++){r-=gw[i].w*luck;if(r<=0)return gw[i].i}
  return gw[gw.length-1].i
}

function genMarketStones(){
  G.mkt=[];
  var count=8+Math.floor(Math.random()*5);
  for(var i=0;i<count;i++){
    var tpl=STONE_TPL[Math.floor(Math.random()*STONE_TPL.length)];
    G.mkt.push(genStone(tpl))
  }
  // Maybe trigger event
  if(Math.random()<.25){
    var evt=EVENTS[Math.floor(Math.random()*EVENTS.length)];
    showEvent(evt)
  }
}

function buyStone(idx){
  if(idx<0||idx>=G.mkt.length)return;
  var st=G.mkt[idx];
  if(G.money<st.price){toast("💰 余额不足！");return}
  G.money-=st.price;G.stats.spent+=st.price;G.stats.gambles++;
  st.gemIdx=rollGem(st.tier);
  st.gemValue=GEMS[st.gemIdx].value;
  G.inv.push(st);G.mkt.splice(idx,1);
  addLog("购入 "+st.name+"（"+st.origin+"）💰"+fmt(st.price),"info");
  addXP(5);
  toast("✅ 购入"+st.name);
  updateHdr();renderMarket();save()
}

function doSynth(){
  if(G.inv.length<3){toast("需要至少3块原石！");return}
  // Take 3 random uncut stones
  var uncut=[];for(var i=0;i<G.inv.length;i++){if(G.inv[i].revealed<4)uncut.push(i)}
  if(uncut.length<3){toast("需要至少3块未切割的原石！");return}
  var cost=1000;
  if(G.money<cost){toast("合成费用💰"+fmt(cost)+"不足！");return}
  G.money-=cost;G.stats.synth++;
  // Remove 3 lowest tier
  uncut.sort(function(a,b){return G.inv[a].tier-G.inv[b].tier});
  var removed=[];for(var i=0;i<3;i++){removed.push(G.inv[uncut[i]])}
  removed.sort(function(a,b){return b.tier-a.tier}); // remove highest indices first
  for(var i=2;i>=0;i--){G.inv.splice(uncut[i],1)}
  // Generate new stone with bonus tier
  var maxTier=0;for(var i=0;i<removed.length;i++){if(removed[i].tier>maxTier)maxTier=removed[i].tier}
  var newTier=Math.min(maxTier+(Math.random()<.3?1:0),4);
  var tpl=STONE_TPL.filter(function(t){return t.tier===newTier});
  if(tpl.length===0)tpl=STONE_TPL.filter(function(t){return t.tier<=newTier});
  var newStone=genStone(tpl[Math.floor(Math.random()*tpl.length)]);
  G.inv.push(newStone);
  addLog("合成成功！"+removed.map(function(s){return s.name}).join("+")+" → "+newStone.name,"work");
  addXP(15);
  toast("⚗️ 合成成功！");
  updateHdr();renderMarket();save()
}

function getHint(st){
  var gem=GEMS[st.gemIdx];
  var light=G.skills.light;
  var hints=[];
  if(st.revealed>=1){
    if(gem.value===0)hints.push({emoji:"🪨",text:"擦开一小口...看起来不太妙，可能是废石"});
    else if(gem.value<500)hints.push({emoji:"🟤",text:"擦开见底，隐约有些颜色，可能是普通玉石"});
    else if(gem.value<2000)hints.push({emoji:"🟢",text:"打灯见绿！有翡翠的可能性"});
    else if(gem.value<10000)hints.push({emoji:"💚",text:"灯光下绿色浓郁，水头不错！"});
    else if(gem.value<50000)hints.push({emoji:"✨",text:"种水极佳！玻璃质感，可能大涨！"});
    else hints.push({emoji:"💎",text:"满绿高冰！这可能是极品！心都在跳！"});
    if(light>=3&&gem.value>0)hints[0].text+=" [打灯见"+(gem.value>10000?"满":"少许")+"绿]";
  }
  if(st.revealed>=2){
    if(gem.value===0)hints.push({emoji:"💀",text:"深磨后...果然是废石，一文不值"});
    else if(gem.value<1000)hints.push({emoji:"😐",text:"磨开更多，品质一般，小涨小跌"});
    else if(gem.value<10000)hints.push({emoji:"😊",text:"绿色面积扩大，种水不错！"});
    else hints.push({emoji:"🤩",text:"大涨预感！绿色浓阳，水头十足！"});
    if(light>=5)hints[1].text+=" [估："+gem.name+"]"
  }
  if(st.revealed>=3){
    if(gem.value===0)hints.push({emoji:"💔",text:"拦腰切开，里面全是石头..."});
    else if(gem.value<2000)hints.push({emoji:"😐",text:"切开后品质一般，小亏"});
    else if(gem.value<20000)hints.push({emoji:"😄",text:"切涨了！绿色正阳，值得期待！"});
    else hints.push({emoji:"🔥",text:"大涨！帝王绿级别的表现！"});
    if(light>=7)hints[2].text+=" [确认："+gem.name+"]"
  }
  return hints[hints.length-1]||{emoji:"🪨",text:"等待加工..."}
}

function getEstimate(st){
  var gem=GEMS[st.gemIdx];
  var eye=G.skills.eye;
  var base=gem.value;
  var range=Math.max(.5,1-eye*.08);
  return{lo:Math.round(base*(1-range)),hi:Math.round(base*(1+range))}
}

function getResellPrice(st){
  var base=st.bought;
  var revealBonus=[0,.1,.3,.6,1];
  var hintBonus=0;
  if(st.revealed>0){
    var gem=GEMS[st.gemIdx];
    if(gem.value>base*2)hintBonus=.4;else if(gem.value>base)hintBonus=.2;else hintBonus=-.1
  }
  return Math.round(base*(.5+revealBonus[st.revealed]+hintBonus))
}

function doAction(stage,cost){
  if(G.money<cost){toast("💰 费用不足！需要"+fmt(cost));return}
  G.money-=cost;G.stats.spent+=cost;
  G.cur.revealed=stage;G.cutStage=stage;
  addXP(stage*3+2);
  var actions=["","擦窗","深磨","半切","全切"];
  addLog(actions[stage]+" "+G.cur.name+"（"+G.cur.origin+"）","info");
  if(stage===4){
    // Fully cut - reveal gem
    var gem=GEMS[G.cur.gemIdx];
    var profit=G.cur.gemValue-G.cur.bought;
    addLog("开出 "+gem.emoji+" "+gem.name+" 价值💰"+fmt(gem.value)+(profit>=0?" 切涨！+":" 切垮 ")+fmt(Math.abs(profit)),profit>=0?"win":"lose");
    G.stats.earned+=G.cur.gemValue;
    if(G.cur.gemValue>G.stats.bigWin)G.stats.bigWin=G.cur.gemValue;
    if(profit<0&&Math.abs(profit)>G.stats.bigLoss)G.stats.bigLoss=Math.abs(profit);
    // Collection
    if(!G.coll[gem.id]){G.coll[gem.id]={count:0,best:0};toast("📖 新玉种收录图鉴："+gem.name+"！")}
    G.coll[gem.id].count++;
    if(G.cur.gemValue>G.coll[gem.id].best)G.coll[gem.id].best=G.cur.gemValue;
    if(G.cur.gemValue>G.best)G.best=G.cur.gemValue;
    // Show result
    setTimeout(function(){showCutResult(G.cur)},500)
  }else{
    showCutOverlay()
  }
  updateHdr();save()
}

  }

function doCarve(carveIdx){
  var st=G.cur;var c=CARVES[carveIdx];
  var cost=Math.round(st.gemValue*.2*(getSeason().mod.cd||1));
  if(G.money<cost){toast("💰 费用不足！");return}
  G.money-=cost;G.stats.spent+=cost;G.stats.carved++;
  var sr=Math.min(.95,c.sr+G.skills.carve*.03+(getSeason().mod.cb||0));
  var success=Math.random()<sr;
  if(success){
    st.carved=1;st.carveTheme=c.name;
    st.carveValue=Math.round(st.gemValue*c.mul);
    G.stats.carveWin++;
    addLog("雕刻"+c.name+"成功！价值×"+c.mul+" → 💰"+fmt(st.carveValue),"win");
    addXP(20);
    toast("🎭 雕刻成功！"+c.icon);
    closeOv();showOv('<div style="font-size:60px">'+c.icon+'</div><h2 style="color:var(--jade)">雕刻成功！</h2><div style="font-size:20px;color:var(--gold);margin:10px 0">💰 '+fmt(st.carveValue)+'</div><p>价值从'+fmt(st.gemValue)+'提升到'+fmt(st.carveValue)+'！</p><button class="btn btn-g btn-blk" onclick="closeOv();renderWorkshop()">返回工坊</button>')
  }else{
    st.gemValue=0;st.gemIdx=0;
    addLog("雕刻"+c.name+"失败！翡翠损毁...","lose");
    toast("💔 雕刻失败，翡翠损毁...");
    closeOv();showOv('<div style="font-size:60px">💔</div><h2 style="color:var(--red)">雕刻失败！</h2><p style="color:var(--dim)">翡翠在雕刻过程中碎裂了...</p><button class="btn btn-r btn-blk" onclick="closeOv();renderWorkshop()">返回工坊</button>')
  }
  updateHdr();renderWorkshop();save()
}

function sellAllCut(){
  var total=0;var kept=[];
  for(var i=0;i<G.inv.length;i++){
    if(G.inv[i].revealed>=4&&G.inv[i].gemValue>0){
      total+=G.inv[i].carved?G.inv[i].carveValue:G.inv[i].gemValue
    }else{kept.push(G.inv[i])}
  }
  if(total===0){toast("没有可出售的");return}
  G.inv=kept;G.money+=total;G.stats.earned+=total;
  addLog("一键出售 💰"+fmt(total),"work");

  updateHdr();renderVault();save()

    showOv('<div style="font-size:60px;margin-bottom:10px">💸</div><h2 style="color:var(--red)">破产了！</h2><p style="color:var(--dim);margin:10px 0">钱都赔光了...<br>去打工赚钱重新来过吧！</p><button class="btn btn-j btn-blk" onclick="doPartTime()">💪 去打工</button>');
    save()
  }
}

// ===== TAB SYSTEM =====
function initTabs(){
  var tabsEl=document.getElementById("tabs");
  var h="";
  for(var i=0;i<TABS.length;i++)h+='<button class="tab'+(i===0?" active":"")+'" data-t="'+TABS[i].id+'" onclick="switchTab(\''+TABS[i].id+'\')">'+TABS[i].name+'</button>';
  tabsEl.innerHTML=h
}
function switchTab(id){
  document.querySelectorAll(".tab").forEach(function(t){t.classList.toggle("active",t.dataset.t===id)});
  document.querySelectorAll(".pnl").forEach(function(p){p.classList.remove("show")});
  document.getElementById("pnl-"+id).classList.add("show");
  var render={market:renderMarket,workshop:renderWorkshop,vault:renderVault,skills:renderSkills,season:renderSeason,atlas:renderAtlas,log:renderLog};
  if(render[id])render[id]() 
}
