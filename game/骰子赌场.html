<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>йӘ°еӯҗиөҢеңә</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a0a;font-family:'Segoe UI',sans-serif;color:#fff}
#app{width:100%;height:100%;display:flex;flex-direction:column}
#statusBar{background:linear-gradient(135deg,#2a0a0a,#1a0505);padding:8px 12px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;border-bottom:2px solid #c9a227}
.stat{font-size:12px;display:flex;align-items:center;gap:3px}
.stat .v{color:#c9a227;font-weight:bold}
#mainArea{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;align-items:center}
#screen{width:100%;max-width:400px}
.screen{display:none}.screen.active{display:block}
h2{text-align:center;color:#c9a227;margin-bottom:10px;font-size:18px}
.btn{display:block;width:100%;padding:10px;margin:5px 0;background:linear-gradient(135deg,#8B0000,#5a0000);color:#fff;border:2px solid #c9a227;border-radius:8px;font-size:14px;cursor:pointer;text-align:center}
.btn:hover{background:linear-gradient(135deg,#a00,#700)}
.btn:disabled{opacity:.5;cursor:default}
.btn.gold{background:linear-gradient(135deg,#c9a227,#8B6914);color:#000;font-weight:bold}
.btn.small{display:inline-block;width:auto;padding:6px 12px;font-size:12px;margin:2px}
.diceArea{display:flex;justify-content:center;gap:10px;margin:15px 0;min-height:60px}
.die{width:50px;height:50px;background:#fff;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#000;font-weight:bold;box-shadow:0 3px 10px rgba(0,0,0,.5);transition:transform .3s}
.die.rolling{animation:diceRoll .5s ease-in-out}
.die.player{border:3px solid #c9a227}
.die.enemy{border:3px solid #f44}
@keyframes diceRoll{0%{transform:rotate(0) scale(1)}25%{transform:rotate(90deg) scale(1.2)}50%{transform:rotate(180deg) scale(.8)}75%{transform:rotate(270deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
.hpBar{width:100%;height:16px;background:#333;border-radius:8px;overflow:hidden;margin:5px 0;border:1px solid #555}
.hpFill{height:100%;transition:width .5s;border-radius:8px}
.hpFill.green{background:linear-gradient(90deg,#0a0,#0f0)}
.hpFill.yellow{background:linear-gradient(90deg,#aa0,#ff0)}
.hpFill.red{background:linear-gradient(90deg,#a00,#f00)}
.enemyCard{text-align:center;background:rgba(139,0,0,.3);border:2px solid #8B0000;border-radius:10px;padding:12px;margin:10px 0}
.enemyIcon{font-size:40px;margin:5px 0}
.enemyName{font-size:16px;color:#f88;font-weight:bold}
.result{text-align:center;font-size:18px;font-weight:bold;margin:10px 0;padding:8px;border-radius:6px}
.result.win{background:rgba(0,180,0,.3);color:#0f0}
.result.lose{background:rgba(180,0,0,.3);color:#f44}
.result.draw{background:rgba(180,180,0,.3);color:#ff0}
.item{background:rgba(50,50,50,.5);border:1px solid #555;border-radius:6px;padding:8px;margin:4px 0;display:flex;justify-content:space-between;align-items:center}
.item .info{font-size:12px}.item .name{font-weight:bold;color:#c9a227}
.item .stats{color:#aaa;font-size:11px}
.item .actions{display:flex;gap:4px}
.rarity.common{border-color:#aaa}.rarity.rare{border-color:#44f}.rarity.epic{border-color:#a0f}.rarity.legend{border-color:#f80}
.shopItem{background:rgba(50,50,30,.5);border:2px solid #c9a227;border-radius:8px;padding:10px;margin:6px 0}
.shopItem .price{color:#c9a227;font-weight:bold}
.eventCard{text-align:center;background:rgba(50,50,0,.3);border:2px solid #c9a227;border-radius:10px;padding:15px;margin:10px 0}
.eventIcon{font-size:45px;margin:5px 0}
.eventDesc{color:#ccc;font-size:13px;margin:8px 0}
.betArea{text-align:center;margin:10px 0}
.betInput{width:80px;padding:6px;font-size:16px;text-align:center;background:#222;border:2px solid #c9a227;border-radius:6px;color:#fff}
.floorInfo{text-align:center;color:#c9a227;font-size:14px;margin:5px 0}
#gameLog{position:fixed;bottom:50px;left:5px;right:5px;max-height:80px;overflow-y:auto;background:rgba(0,0,0,.7);border:1px solid #333;border-radius:6px;padding:5px;font-size:10px;color:#aaa;z-index:5;pointer-events:none}
.logLine{margin:1px 0}
#bottomNav{display:flex;background:#1a0505;border-top:2px solid #c9a227}
.navBtn{flex:1;padding:8px;text-align:center;font-size:11px;color:#aaa;cursor:pointer;border:none;background:none}
.navBtn.active{color:#c9a227;border-bottom:2px solid #c9a227}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="app">
  <div id="statusBar">
    <div class="stat">вқӨпёҸ<span class="v" id="sHp">100</span>/<span id="sMaxHp">100</span></div>
    <div class="stat">вҡ”пёҸ<span class="v" id="sAtk">10</span></div>

  </div>
  <div id="mainArea">
    <div id="screen">
      <!-- жҲҳж–— -->
      <div class="screen active" id="scrBattle">
        <div class="floorInfo" id="floorInfo">з¬¬1еұӮ</div>
        <div class="enemyCard">
          <div class="enemyIcon" id="eIcon">рҹ‘ҫ</div>
          <div class="enemyName" id="eName">е°ҸжҖӘзү©</div>
          <div style="font-size:11px;color:#aaa" id="eDesc">жҷ®йҖҡж•Ңдәә</div>
          <div class="hpBar"><div class="hpFill green" id="eHpBar" style="width:100%"></div></div>
          <div style="font-size:11px"><span id="eHp">30</span>/<span id="eMaxHp">30</span> HP</div>
        </div>
        <div class="diceArea">
          <div class="die player" id="d0">?</div>
          <div class="die player" id="d1">?</div>
          <div class="die player" id="d2">?</div>
          <div style="width:20px"></div>
          <div class="die enemy" id="d3">?</div>
          <div class="die enemy" id="d4">?</div>
          <div class="die enemy" id="d5">?</div>
        </div>
        <div class="result hidden" id="battleResult"></div>
        <div style="font-size:11px;text-align:center;color:#aaa" id="battleInfo">жҠ•йӘ°еӯҗеҶіе®ҡи°Ғе…ҲжүӢпјҒ</div>
        <button class="btn" id="btnRoll" onclick="doBattle()">рҹҺІ жҠ•йӘ°еӯҗжҲҳж–—пјҒ</button>
        <button class="btn hidden" id="btnNextEnemy" onclick="nextEnemy()">вһЎпёҸ дёӢдёҖдёӘж•Ңдәә</button>
        <button class="btn hidden" id="btnNextFloor" onclick="nextFloor()">в¬ҶпёҸ иҝӣе…ҘдёӢдёҖеұӮ</button>
      </div>
      <!-- иөҢеңә -->
      <div class="screen" id="scrCasino">
        <h2>рҹҺ° иөҢеңә</h2>
        <div class="betArea">
          <div style="margin:5px">еҪ“еүҚйҮ‘еёҒпјҡ<span style="color:#c9a227;font-weight:bold" id="cGold">50</span></div>
          <div style="margin:5px">жҠјжіЁйҮ‘йўқпјҡ</div>
          <input type="number" class="betInput" id="betAmount" value="10" min="1">
          <div style="margin:10px 0">
            <button class="btn small gold" onclick="doCasino('big')">рҹ“Ҳ еӨ§ (вүҘ11)</button>
            <button class="btn small gold" onclick="doCasino('small')">рҹ“ү е°Ҹ (вүӨ10)</button>
            <button class="btn small gold" onclick="doCasino('odd')">рҹ”ў еҘҮж•°</button>
            <button class="btn small gold" onclick="doCasino('even')">рҹ”ў еҒ¶ж•°</button>
          </div>
          <button class="btn gold" onclick="doCasino('triple')">рҹҺҜ иұ№еӯҗ (Г—10)</button>
        </div>
        <div class="diceArea" id="casinoDice">
          <div class="die" id="cd0">?</div>
          <div class="die" id="cd1">?</div>
          <div class="die" id="cd2">?</div>
        </div>
        <div class="result hidden" id="casinoResult"></div>
      </div>
      <!-- е•Ҷеә— -->
      <div class="screen" id="scrShop">
        <h2>рҹҸӘ е•Ҷеә—</h2>
        <div id="shopList"></div>
        <button class="btn" onclick="refreshShop()">рҹ”„ еҲ·ж–°е•Ҷе“Ғ (10йҮ‘)</button>
      </div>
      <!-- иғҢеҢ… -->
      <div class="screen" id="scrBag">
        <h2>рҹҺ’ иғҢеҢ…</h2>
        <div style="font-size:12px;color:#aaa;text-align:center;margin:5px">иЈ…еӨҮеұһжҖ§дјҡиҮӘеҠЁеҸ еҠ еҲ°и§’иүІ</div>
        <div id="bagList"></div>
        <button class="btn" onclick="sellAll()">рҹ’° дёҖй”®еҮәе”®жүҖжңүжңӘиЈ…еӨҮ</button>
      </div>
      <!-- дәӢд»¶ -->
      <div class="screen" id="scrEvent">
        <div class="eventCard">
          <div class="eventIcon" id="evIcon">вқ“</div>
          <h2 id="evTitle">зҘһз§ҳдәӢд»¶</h2>
          <div class="eventDesc" id="evDesc">...</div>
          <div id="evButtons"></div>
        </div>
      </div>
    </div>
  </div>
  <div id="gameLog"></div>
  <div id="bottomNav">
    <button class="navBtn active" onclick="showScr('Battle')">вҡ”пёҸжҲҳж–—</button>
    <button class="navBtn" onclick="showScr('Casino')">рҹҺ°иөҢеңә</button>
    <button class="navBtn" onclick="showScr('Shop')">рҹҸӘе•Ҷеә—</button>
    <button class="navBtn" onclick="showScr('Bag')">рҹҺ’иғҢеҢ…</button>
  </div>
</div>
<script>
const ENEMIES=[
  {name:'е°ҸжҖӘзү©',icon:'рҹ‘ҫ',hp:30,atk:5,def:2,gold:15,desc:'жңҖејұзҡ„ж•Ңдәә'},
  {name:'йҮҺзӢј',icon:'рҹҗә',hp:40,atk:8,def:3,gold:20,desc:'йҖҹеәҰеҫҲеҝ«'},
  {name:'йӘ·й«…е…ө',icon:'рҹ’Җ',hp:50,atk:10,def:5,gold:25,desc:'йӘЁеӨҙеҫҲзЎ¬'},
  {name:'иқҷиқ ',icon:'рҹҰҮ',hp:35,atk:12,def:2,gold:30,desc:'ж”»еҮ»еҫҲй«ҳ'},
  {name:'зҹіеӨҙдәә',icon:'рҹ—ҝ',hp:80,atk:8,def:10,gold:35,desc:'и¶…зә§иӮүзӣҫ'},
  {name:'жҡ—еҪұеҲәе®ў',icon:'рҹҘ·',hp:45,atk:15,def:4,gold:40,desc:'иҮҙе‘ҪдёҖеҮ»'},
  {name:'зҒ«з„°жі•еёҲ',icon:'рҹ§ҷ',hp:55,atk:18,def:6,gold:45,desc:'йӯ”жі•дјӨе®і'},
  {name:'еҶ°йңңе·Ёдәә',icon:'рҹ§Ң',hp:100,atk:12,def:12,gold:50,desc:'еҶ°еҶ·д№ӢиәҜ'},
  {name:'жҒ¶йӯ”',icon:'рҹ‘№',hp:80,atk:20,def:8,gold:60,desc:'жқҘиҮӘең°зӢұ'},
  {name:'жӯ»зҘһ',icon:'рҹ’Җ',hp:120,atk:25,def:15,gold:80,desc:'ж”¶еүІз”ҹе‘Ҫ'},
  {name:'йҫҷ',icon:'рҹҗү',hp:150,atk:30,def:20,gold:100,desc:'иҝңеҸӨе·Ёйҫҷ'},
  {name:'йӘ°еӯҗд№ӢзҘһ',icon:'рҹҺІ',hp:300,atk:40,def:25,gold:200,desc:'жңҖз»ҲBOSSпјҒжҺҢжҺ§е‘ҪиҝҗпјҒ'}
];
const BOSSES=[4,7,9,11];
const ITEMS=[
  {name:'й“Ғеү‘',type:'weapon',atk:3,price:30,rarity:'common',icon:'вҡ”пёҸ'},
  {name:'й’ўеү‘',type:'weapon',atk:6,price:60,rarity:'common',icon:'вҡ”пёҸ'},
  {name:'зҒ«з„°еү‘',type:'weapon',atk:10,price:120,rarity:'rare',icon:'рҹ—ЎпёҸ'},
  {name:'йӣ·зҘһд№Ӣй”Ө',type:'weapon',atk:15,price:200,rarity:'epic',icon:'рҹ”Ё'},
  {name:'зҒӯдё–д№ӢеҲғ',type:'weapon',atk:25,price:500,rarity:'legend',icon:'вҡ”пёҸ'},
  {name:'зҡ®з”І',type:'armor',def:3,price:30,rarity:'common',icon:'рҹӣЎпёҸ'},
  {name:'й”Ғеӯҗз”І',type:'armor',def:6,price:60,rarity:'common',icon:'рҹӣЎпёҸ'},
  {name:'зҒ«з„°й“ з”І',type:'armor',def:10,price:120,rarity:'rare',icon:'рҹӣЎпёҸ'},
  {name:'йҫҷйіһз”І',type:'armor',def:15,price:200,rarity:'epic',icon:'рҹӣЎпёҸ'},
  {name:'зҘһд№Ӣй“ з”І',type:'armor',def:25,price:500,rarity:'legend',icon:'рҹӣЎпёҸ'},
  {name:'з”ҹе‘ҪжҲ’жҢҮ',type:'ring',hp:20,price:40,rarity:'common',icon:'рҹ’Қ'},
  {name:'еҠӣйҮҸжҲ’жҢҮ',type:'ring',atk:5,price:80,rarity:'rare',icon:'рҹ’Қ'},
  {name:'е®ҲжҠӨжҲ’жҢҮ',type:'ring',def:5,price:80,rarity:'rare',icon:'рҹ’Қ'},
  {name:'е№ёиҝҗжҲ’жҢҮ',type:'ring',diceMod:1,price:150,rarity:'epic',icon:'рҹ’Қ'},
  {name:'е‘Ҫиҝҗд№ӢжҲ’',type:'ring',diceMod:2,price:400,rarity:'legend',icon:'рҹ’Қ'},
  {name:'е°ҸиҚҜж°ҙ',type:'consumable',heal:30,price:20,rarity:'common',icon:'рҹ§ҙ'},
  {name:'еӨ§иҚҜж°ҙ',type:'consumable',heal:80,price:50,rarity:'rare',icon:'рҹ§ҙ'},
  {name:'ж»ЎиЎҖиҚҜж°ҙ',type:'consumable',heal:999,price:100,rarity:'epic',icon:'рҹ§ҙ'}
];
const EVENTS=[
  {icon:'рҹ§ҷ',title:'зҘһз§ҳе•Ҷдәә',desc:'дёҖдёӘзҘһз§ҳе•ҶдәәеҮәзҺ°дәҶпјҒ',options:[{text:'иҠұ50йҮ‘д№°йҡҸжңәиЈ…еӨҮ',cost:50,action:'buyRandom'},{text:'зҰ»ејҖ',action:'leave'}]},
  {icon:'рҹ‘ё',title:'е№ёиҝҗеҘізҘһ',desc:'е№ёиҝҗеҘізҘһзҘқзҰҸдәҶдҪ пјҒдёӢж¬ЎжҠ•йӘ°еӯҗ+2пјҒ',options:[{text:'жҺҘеҸ—зҘқзҰҸ',action:'diceMod',val:2}]},
  {icon:'рҹ‘»',title:'иҜ…е’’д№Ӣең°',desc:'дҪ иў«иҜ…е’’дәҶпјҒдёӢж¬ЎжҠ•йӘ°еӯҗ-2пјҒ',options:[{text:'жҺҘеҸ—иҜ…е’’',action:'diceMod',val:-2},{text:'иҠұ30йҮ‘й©ұж•Ј',cost:30,action:'removeDebuff'}]},
  {icon:'рҹҺІ',title:'иөҢеңәеә„е®¶',desc:'еә„е®¶еҜ№дҪ зңЁзңЁзңјпјҢдјјд№ҺеңЁдҪңејҠ...',options:[{text:'жҸӯз©ҝд»–пјҒ(иөўдәҶГ—3)',action:'cheat',mult:3},{text:'з®—дәҶ',action:'leave'}]},
  {icon:'рҹ’Һ',title:'е®қз®ұ',desc:'дҪ еҸ‘зҺ°дәҶдёҖдёӘе®қз®ұпјҒ',options:[{text:'жү“ејҖ',action:'treasure'},{text:'йҷ·йҳұпјҒ(е°Ҹеҝғ)',action:'leave'}]},
  {icon:'рҹҸҘ',title:'жІ»з–—жіүж°ҙ',desc:'жё…жҫҲзҡ„жіүж°ҙж•ЈеҸ‘зқҖз”ҹе‘Ҫж°”жҒҜ',options:[{text:'е–қдёҖеҸЈ(жҒўеӨҚ50HP)',action:'heal',val:50},{text:'иЈ…з“¶еёҰиө°(иҠұ20йҮ‘)',cost:20,action:'healBottle'}]}
];

let state={
  hp:100,maxHp:100,atk:10,def:5,gold:50,floor:1,diceMod:0,
  bag:[],equipped:{weapon:null,armor:null,ring:null},
  enemiesLeft:0,curEnemy:null,curEnemyHp:0,
  shopItems:[]
};

const SAVE_KEY='dice_casino_save';
function saveGame(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(state))}catch(e){}}
function loadGame(){try{const d=localStorage.getItem(SAVE_KEY);if(d){const loaded=JSON.parse(d);Object.assign(state,loaded);return true}}catch(e){}return false}
function clearSave(){try{localStorage.removeItem(SAVE_KEY)}catch(e){}}

function log(t){const d=document.getElementById('gameLog');d.innerHTML+=`<div class="logLine">${t}</div>`;d.scrollTop=d.scrollHeight}

function getTotalAtk(){let a=state.atk;if(state.equipped.weapon){const i=ITEMS.find(x=>x.name===state.equipped.weapon);if(i)a+=i.atk||0}if(state.equipped.ring){const i=ITEMS.find(x=>x.name===state.equipped.ring);if(i)a+=i.atk||0}return a}
function getTotalDef(){let d=state.def;if(state.equipped.armor){const i=ITEMS.find(x=>x.name===state.equipped.armor);if(i)d+=i.def||0}if(state.equipped.ring){const i=ITEMS.find(x=>x.name===state.equipped.ring);if(i)d+=i.def||0}return d}
function getTotalMaxHp(){let h=state.maxHp;if(state.equipped.ring){const i=ITEMS.find(x=>x.name===state.equipped.ring);if(i)h+=i.hp||0}return h}
function getDiceMod(){let m=state.diceMod;if(state.equipped.ring){const i=ITEMS.find(x=>x.name===state.equipped.ring);if(i)m+=i.diceMod||0}return m}

function updateUI(){
  document.getElementById('sHp').textContent=state.hp;document.getElementById('sMaxHp').textContent=getTotalMaxHp();
  document.getElementById('sAtk').textContent=getTotalAtk();document.getElementById('sDef').textContent=getTotalDef();
  document.getElementById('sGold').textContent=state.gold;document.getElementById('sFloor').textContent=state.floor;
  document.getElementById('sDiceMod').textContent=getDiceMod();
  document.getElementById('cGold').textContent=state.gold;
  if(state.hp>getTotalMaxHp()*0.6)document.getElementById('sHp').style.color='#0f0';
  else if(state.hp>getTotalMaxHp()*0.3)document.getElementById('sHp').style.color='#fc0';
  else document.getElementById('sHp').style.color='#f44';
}

function rollDice(n,mod){
  let r=[];for(let i=0;i<n;i++)r.push(Math.floor(Math.random()*6)+1);
  if(mod)r=r.map(v=>Math.max(1,Math.min(6,v+mod)));return r;
}

function isTriple(d){return d[0]===d[1]&&d[1]===d[2]}
function sum(d){return d[0]+d[1]+d[2]}

function showScr(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('scr'+name).classList.add('active');
  document.querySelectorAll('.navBtn').forEach((b,i)=>b.classList.toggle('active',['Battle','Casino','Shop','Bag'][i]===name));
  if(name==='Shop')renderShop();if(name==='Bag')renderBag();updateUI();
}

function startFloor(){
  const f=state.floor;
  const isBoss=BOSSES.includes(f-1);
  let enemyIdx;
  if(isBoss){enemyIdx=BOSSES[BOSSES.indexOf(f-1)]}
  else{const pool=[];for(let i=0;i<Math.min(ENEMIES.length-1,f*2);i++)pool.push(i);enemyIdx=pool[Math.floor(Math.random()*pool.length)]}
  const e=ENEMIES[enemyIdx];
  const mult=1+(f-1)*0.3;
  state.curEnemy={...e,hp:Math.floor(e.hp*mult),atk:Math.floor(e.atk*mult),def:Math.floor(e.def*mult),gold:Math.floor(e.gold*mult),isBoss};
  state.curEnemyHp=state.curEnemy.hp;
  state.enemiesLeft=isBoss?1:2+Math.floor(f*0.5);
  showEnemy();showScr('Battle');
  document.getElementById('btnRoll').classList.remove('hidden');document.getElementById('btnRoll').disabled=false;
  document.getElementById('btnNextEnemy').classList.add('hidden');
  document.getElementById('btnNextFloor').classList.add('hidden');
  document.getElementById('battleResult').classList.add('hidden');
  document.getElementById('battleInfo').textContent='жҠ•йӘ°еӯҗеҶіе®ҡи°Ғе…ҲжүӢпјҒ';
  document.getElementById('floorInfo').textContent=isBoss?`вҡ пёҸ BOSSжҲҳпјҒз¬¬${f}еұӮ`:`з¬¬${f}еұӮ (${state.enemiesLeft}дёӘж•Ңдәә)`;
  log(`иҝӣе…Ҙз¬¬${f}еұӮпјҢйҒҮеҲ°${e.name}пјҒ`);
}

function showEnemy(){
  const e=state.curEnemy;
  document.getElementById('eIcon').textContent=e.icon;document.getElementById('eName').textContent=e.name+(e.isBoss?' вҡ пёҸBOSS':'');
  document.getElementById('eDesc').textContent=e.desc;
  document.getElementById('eHp').textContent=state.curEnemyHp;document.getElementById('eMaxHp').textContent=e.hp;
  const pct=state.curEnemyHp/e.hp*100;
  const bar=document.getElementById('eHpBar');bar.style.width=pct+'%';
  bar.className='hpFill '+(pct>60?'green':pct>30?'yellow':'red');
}

function animateDice(ids,results,cb){
  ids.forEach(id=>{document.getElementById(id).classList.add('rolling');document.getElementById(id).textContent='рҹҺІ'});
  setTimeout(()=>{
    ids.forEach((id,i)=>{document.getElementById(id).classList.remove('rolling');document.getElementById(id).textContent=results[i]});
    if(cb)cb();
  },500);
}

function doBattle(){
  const btn=document.getElementById('btnRoll');btn.disabled=true;
  const dm=getDiceMod();
  const pd=rollDice(3,dm),ed=rollDice(3,0);
  animateDice(['d0','d1','d2'],pd,()=>{
    animateDice(['d3','d4','d5'],ed,()=>{
      const ps=sum(pd),es=sum(ed);
      const pTriple=isTriple(pd),eTriple=isTriple(ed);
      let info='',result='';
      if(pTriple&&!eTriple){info='рҹҺҜ дҪ жҠ•еҮәиұ№еӯҗпјҒзӣҙжҺҘз§’жқҖпјҒ';result='win';dealDmg(state.curEnemyHp,'player')}
      else if(eTriple&&!pTriple){info='рҹ’Җ ж•ҢдәәжҠ•еҮәиұ№еӯҗпјҒдҪ иў«з§’жқҖпјҒ';result='lose';state.hp=0}
      else if(ps>es){info=`дҪ  ${ps} vs ${es} ж•ҢдәәпјҢдҪ е…ҲжүӢпјҒ`;result='playerFirst'}
      else if(es>ps){info=`дҪ  ${ps} vs ${es} ж•ҢдәәпјҢж•Ңдәәе…ҲжүӢпјҒ`;result='enemyFirst'}
      else{info=`е№іеұҖ ${ps}=${es}пјҢйҮҚж–°жҠ•пјҒ`;result='draw'}
      document.getElementById('battleInfo').textContent=info;
      log(`рҹҺІ дҪ [${pd.join(',')}]${ps} vs ж•Ңдәә[${ed.join(',')}]${es}`);
      if(result==='win'){onBattleWin()}
      else if(result==='lose'){onBattleLose()}
      else if(result==='draw'){btn.disabled=false}
      else{
        const dmg=result==='playerFirst'?Math.max(1,getTotalAtk()-state.curEnemy.def):0;
        const eDmg=result==='enemyFirst'?Math.max(1,state.curEnemy.atk-getTotalDef()):0;
        setTimeout(()=>{
          if(result==='playerFirst'){dealDmg(dmg,'player');state.curEnemyHp-=dmg;log(`вҡ”пёҸ дҪ йҖ жҲҗ${dmg}дјӨе®і`);if(state.curEnemyHp<=0){onBattleWin();return}showEnemy()}
          else{state.hp-=eDmg;log(`рҹ’Ҙ ж•ҢдәәйҖ жҲҗ${eDmg}дјӨе®і`);if(state.hp<=0){onBattleLose();return}}
          setTimeout(()=>{
            if(result==='playerFirst'){
              const eDmg2=Math.max(1,state.curEnemy.atk-getTotalDef());state.hp-=eDmg2;log(`рҹ’Ҙ ж•ҢдәәеҸҚеҮ»${eDmg2}дјӨе®і`);
              if(state.hp<=0){onBattleLose();return}
            }else{
              const dmg2=Math.max(1,getTotalAtk()-state.curEnemy.def);state.curEnemyHp-=dmg2;log(`вҡ”пёҸ дҪ еҸҚеҮ»${dmg2}дјӨе®і`);
              if(state.curEnemyHp<=0){onBattleWin();return}showEnemy()
            }
            btn.disabled=false;updateUI();
          },600);
        },600);
      }
    });
  });
}

function dealDmg(dmg,who){
  const el=document.createElement('div');el.style.cssText=`position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:28px;font-weight:bold;color:${who==='player'?'#0f0':'#f44'};z-index:100;pointer-events:none;text-shadow:0 0 10px ${who==='player'?'#0f0':'#f44'}`;
  el.textContent=(who==='player'?'-':'-')+dmg;document.body.appendChild(el);
  let y=0;const anim=()=>{y-=2;el.style.transform=`translate(-50%,-50%) translateY(${y}px)`;el.style.opacity=1+y/100;if(y>-100)requestAnimationFrame(anim);else el.remove()};requestAnimationFrame(anim);
}

function onBattleWin(){
  const e=state.curEnemy;state.gold+=e.gold;state.enemiesLeft--;saveGame();
  log(`вң… еҮ»иҙҘ${e.name}пјҒиҺ·еҫ—${e.gold}йҮ‘`);
  document.getElementById('battleResult').textContent=`рҹҺү иғңеҲ©пјҒ+${e.gold}йҮ‘`;document.getElementById('battleResult').className='result win';
  document.getElementById('battleResult').classList.remove('hidden');
  document.getElementById('btnRoll').classList.add('hidden');
  // Drop item
  if(Math.random()<0.4){
    const pool=ITEMS.filter(i=>i.type!=='consumable');const item=pool[Math.floor(Math.random()*pool.length)];
    state.bag.push({...item,uid:Date.now()+Math.random()});
    log(`рҹҺҒ жҺүиҗҪпјҡ${item.icon} ${item.name}`);
  }
  if(state.enemiesLeft>0)document.getElementById('btnNextEnemy').classList.remove('hidden');
  else document.getElementById('btnNextFloor').classList.remove('hidden');
  // Random event chance
  if(Math.random()<0.3&&!e.isBoss){setTimeout(()=>triggerEvent(),500)}
  updateUI();
}

function onBattleLose(){
  log('рҹ’Җ дҪ иў«еҮ»иҙҘдәҶпјҒ');
  document.getElementById('battleResult').textContent='рҹ’Җ дҪ иў«еҮ»иҙҘдәҶпјҒ';document.getElementById('battleResult').className='result lose';
  document.getElementById('battleResult').classList.remove('hidden');
  document.getElementById('btnRoll').classList.add('hidden');
  state.hp=Math.floor(getTotalMaxHp()*0.3);state.gold=Math.floor(state.gold*0.5);saveGame();
  log('рҹ’Ҡ еӨҚжҙ»пјҡ30%HPпјҢжҚҹеӨұ50%йҮ‘еёҒ');
  setTimeout(()=>{document.getElementById('btnNextFloor').classList.remove('hidden');updateUI()},1000);
}

function nextEnemy(){
  const f=state.floor;const pool=[];for(let i=0;i<Math.min(ENEMIES.length-1,f*2);i++)pool.push(i);
  const idx=pool[Math.floor(Math.random()*pool.length)];const e=ENEMIES[idx];const mult=1+(f-1)*0.3;
  state.curEnemy={...e,hp:Math.floor(e.hp*mult),atk:Math.floor(e.atk*mult),def:Math.floor(e.def*mult),gold:Math.floor(e.gold*mult),isBoss:false};
  state.curEnemyHp=state.curEnemy.hp;showEnemy();
  document.getElementById('btnNextEnemy').classList.add('hidden');document.getElementById('btnRoll').classList.remove('hidden');document.getElementById('btnRoll').disabled=false;
  document.getElementById('battleResult').classList.add('hidden');document.getElementById('battleInfo').textContent='жҠ•йӘ°еӯҗеҶіе®ҡи°Ғе…ҲжүӢпјҒ';
  document.getElementById('floorInfo').textContent=`з¬¬${f}еұӮ (${state.enemiesLeft}дёӘж•Ңдәә)`;updateUI();
}

function nextFloor(){
  state.floor++;saveGame();if(state.floor>10){onGameWin();return}
  // Heal between floors
  state.hp=Math.min(getTotalMaxHp(),state.hp+Math.floor(getTotalMaxHp()*0.3));
  startFloor();updateUI();
}

function onGameWin(){
  clearSave();
  document.getElementById('battleResult').textContent='рҹҸҶ жҒӯе–ңйҖҡе…іпјҒдҪ жҳҜйӘ°еӯҗд№ӢзҘһпјҒ';document.getElementById('battleResult').className='result win';
  document.getElementById('battleResult').classList.remove('hidden');
  document.getElementById('btnRoll').classList.add('hidden');document.getElementById('btnNextFloor').classList.add('hidden');
  log('рҹҸҶрҹҸҶрҹҸҶ йҖҡе…іпјҒдҪ жҳҜйӘ°еӯҗд№ӢзҘһпјҒ');
}

function doCasino(type){
  const bet=parseInt(document.getElementById('betAmount').value)||10;
  if(bet>state.gold){log('рҹ’° йҮ‘еёҒдёҚи¶іпјҒ');return}
  if(bet<1){log('рҹ’° жңҖдҪҺжҠј1йҮ‘пјҒ');return}
  const d=rollDice(3,0);const s=sum(d);const tri=isTriple(d);
  animateDice(['cd0','cd1','cd2'],d,()=>{
    let win=false,mult=0;
    if(type==='big'){win=s>=11&&!tri;mult=2}
    else if(type==='small'){win=s<=10&&!tri;mult=2}
    else if(type==='odd'){win=s%2===1&&!tri;mult=2}
    else if(type==='even'){win=s%2===0&&!tri;mult=2}
    else if(type==='triple'){win=tri;mult=10}
    const el=document.getElementById('casinoResult');
    if(win){const gain=bet*(mult-1);state.gold+=gain;el.textContent=`рҹҺү дёӯдәҶпјҒ+${gain}йҮ‘ (${s}${tri?' иұ№еӯҗ!':''})`;el.className='result win';log(`рҹҺ° иөўдәҶпјҒ${s}${tri?' иұ№еӯҗ!':''} +${gain}йҮ‘`)}
    else{state.gold-=bet;el.textContent=`рҹ’Җ жІЎдёӯпјҒ-${bet}йҮ‘ (${s}${tri?' иұ№еӯҗ!':''})`;el.className='result lose';log(`рҹҺ° иҫ“дәҶпјҒ${s}${tri?' иұ№еӯҗ!':''} -${bet}йҮ‘`)}
    el.classList.remove('hidden');updateUI();
  });
}

function renderShop(){
  if(state.shopItems.length===0)refreshShop();
  const el=document.getElementById('shopList');el.innerHTML='';
  state.shopItems.forEach((item,i)=>{
    const div=document.createElement('div');div.className='shopItem item rarity '+item.rarity;
    const stats=[];if(item.atk)stats.push(`вҡ”пёҸ+${item.atk}`);if(item.def)stats.push(`рҹӣЎпёҸ+${item.def}`);if(item.hp)stats.push(`вқӨпёҸ+${item.hp}`);if(item.diceMod)stats.push(`рҹҺІ${item.diceMod>0?'+':''}${item.diceMod}`);if(item.heal)stats.push(`рҹ’ҡеӣһеӨҚ${item.heal}`);
    div.innerHTML=`<div class="info"><div class="name">${item.icon} ${item.name}</div><div class="stats">${stats.join(' ')}</div></div><div class="actions"><button class="btn small gold" onclick="buyItem(${i})">рҹ’°${item.price}</button></div>`;
    el.appendChild(div);
  });
}

function refreshShop(){
  state.shopItems=[];const pool=ITEMS.filter(i=>i.type!=='consumable'||Math.random()<0.5);
  for(let i=0;i<5;i++){const item=pool[Math.floor(Math.random()*pool.length)];state.shopItems.push({...item})}
  renderShop();
}

function buyItem(i){
  const item=state.shopItems[i];if(state.gold<item.price){log('рҹ’° йҮ‘еёҒдёҚи¶іпјҒ');return}
  state.gold-=item.price;state.bag.push({...item,uid:Date.now()+Math.random()});saveGame();
  log(`рҹӣ’ иҙӯд№°пјҡ${item.icon} ${item.name}`);state.shopItems.splice(i,1);renderShop();updateUI();
}

function renderBag(){
  const el=document.getElementById('bagList');el.innerHTML='';
  // Equipped
  ['weapon','armor','ring'].forEach(slot=>{
    const name=state.equipped[slot];const item=name?ITEMS.find(x=>x.name===name):null;
    const div=document.createElement('div');div.className='item rarity '+(item?item.rarity:'common');
    const stats=[];if(item){if(item.atk)stats.push(`вҡ”пёҸ+${item.atk}`);if(item.def)stats.push(`рҹӣЎпёҸ+${item.def}`);if(item.hp)stats.push(`вқӨпёҸ+${item.hp}`);if(item.diceMod)stats.push(`рҹҺІ${item.diceMod>0?'+':''}${item.diceMod}`)}
    const slotName=slot==='weapon'?'жӯҰеҷЁ':slot==='armor'?'жҠӨз”І':'жҲ’жҢҮ';
    div.innerHTML=`<div class="info"><div class="name">${slotName}пјҡ${item?item.icon+' '+item.name:'жңӘиЈ…еӨҮ'}</div><div class="stats">${stats.join(' ')}</div></div><div class="actions">${item?`<button class="btn small" onclick="unequip('${slot}')">еҚёдёӢ</button>`:''}</div>`;
    el.appendChild(div);
  });
  // Bag items
  const bagTitle=document.createElement('div');bagTitle.style.cssText='color:#c9a227;font-size:14px;margin:10px 0 5px';bagTitle.textContent='иғҢеҢ…зү©е“Ғ';el.appendChild(bagTitle);
  if(state.bag.length===0){const empty=document.createElement('div');empty.style.cssText='color:#666;font-size:12px;text-align:center';empty.textContent='иғҢеҢ…з©әз©әеҰӮд№ҹ';el.appendChild(empty);return}
  state.bag.forEach((item,i)=>{
    const div=document.createElement('div');div.className='item rarity '+item.rarity;
    const stats=[];if(item.atk)stats.push(`вҡ”пёҸ+${item.atk}`);if(item.def)stats.push(`рҹӣЎпёҸ+${item.def}`);if(item.hp)stats.push(`вқӨпёҸ+${item.hp}`);if(item.diceMod)stats.push(`рҹҺІ${item.diceMod>0?'+':''}${item.diceMod}`);if(item.heal)stats.push(`рҹ’ҡеӣһеӨҚ${item.heal}`);
    const actBtns=[];
    if(item.type==='consumable'){actBtns.push(`<button class="btn small gold" onclick="useItem(${i})">дҪҝз”Ё</button>`)}
    else{actBtns.push(`<button class="btn small gold" onclick="equipItem(${i})">иЈ…еӨҮ</button>`)}
    actBtns.push(`<button class="btn small" onclick="sellItem(${i})">рҹ’°${Math.floor(item.price*0.5)}</button>`);
    div.innerHTML=`<div class="info"><div class="name">${item.icon} ${item.name}</div><div class="stats">${stats.join(' ')}</div></div><div class="actions">${actBtns.join('')}</div>`;
    el.appendChild(div);
  });
}

function equipItem(i){
  const item=state.bag[i];
  if(state.equipped[item.type]){
    const old=ITEMS.find(x=>x.name===state.equipped[item.type]);
    if(old)state.bag.push({...old,uid:Date.now()+Math.random()});
  }
  state.equipped[item.type]=item.name;state.bag.splice(i,1);saveGame();
  log(`рҹ”§ иЈ…еӨҮпјҡ${item.icon} ${item.name}`);renderBag();updateUI();
}

function unequip(slot){
  const name=state.equipped[slot];if(!name)return;
  const item=ITEMS.find(x=>x.name===name);
  if(item)state.bag.push({...item,uid:Date.now()+Math.random()});saveGame();
  state.equipped[slot]=null;log(`рҹ“Ө еҚёдёӢпјҡ${item.icon} ${item.name}`);renderBag();updateUI();
}

function useItem(i){
  const item=state.bag[i];
  if(item.type==='consumable'){
    const heal=item.heal===999?getTotalMaxHp():item.heal;
    state.hp=Math.min(getTotalMaxHp(),state.hp+heal);
    log(`рҹ’ҡ дҪҝз”Ё${item.name}пјҢжҒўеӨҚ${heal}HP`);state.bag.splice(i,1);renderBag();updateUI();
  }
}

function sellItem(i){
  const item=state.bag[i];const gold=Math.floor(item.price*0.5);
  state.gold+=gold;state.bag.splice(i,1);saveGame();log(`рҹ’° еҮәе”®${item.name}пјҢ+${gold}йҮ‘`);renderBag();updateUI();
}

function sellAll(){
  let total=0;state.bag.forEach(item=>{total+=Math.floor(item.price*0.5)});
  state.gold+=total;state.bag=[];saveGame();log(`рҹ’° дёҖй”®еҮәе”®пјҢ+${total}йҮ‘`);renderBag();updateUI();
}

function triggerEvent(){
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  document.getElementById('evIcon').textContent=ev.icon;
  document.getElementById('evTitle').textContent=ev.title;
  document.getElementById('evDesc').textContent=ev.desc;
  const btns=document.getElementById('evButtons');btns.innerHTML='';
  ev.options.forEach(opt=>{
    const btn=document.createElement('button');btn.className='btn';btn.textContent=opt.text;
    btn.onclick=()=>{
      if(opt.cost&&state.gold<opt.cost){log('рҹ’° йҮ‘еёҒдёҚи¶іпјҒ');return}
      if(opt.cost)state.gold-=opt.cost;
      if(opt.action==='buyRandom'){const pool=ITEMS.filter(x=>x.type!=='consumable');const item=pool[Math.floor(Math.random()*pool.length)];state.bag.push({...item,uid:Date.now()+Math.random()});log(`рҹҺҒ иҺ·еҫ—пјҡ${item.icon} ${item.name}`)}
      else if(opt.action==='diceMod'){state.diceMod+=opt.val;saveGame();log(`рҹҺІ йӘ°еӯҗдҝ®жӯЈ${opt.val>0?'+':''}${opt.val}`)}
      else if(opt.action==='removeDebuff'){state.diceMod=Math.max(0,state.diceMod);saveGame();log('вңЁ иҜ…е’’е·Ій©ұж•Ј')}
      else if(opt.action==='cheat'){if(Math.random()<0.5){const g=opt.mult*30;state.gold+=g;saveGame();log(`рҹҺ° жҸӯз©ҝеә„е®¶пјҒ+${g}йҮ‘`)}else{state.gold=Math.max(0,state.gold-30);log('рҹ’Җ жІЎжҠ“еҲ°пјҢиў«зҪҡ30йҮ‘')}}
      else if(opt.action==='treasure'){const g=30+Math.floor(Math.random()*50);state.gold+=g;saveGame();log(`рҹ’Һ е®қз®ұйҮҢжңү${g}йҮ‘пјҒ`)}
      else if(opt.action==='heal'){state.hp=Math.min(getTotalMaxHp(),state.hp+opt.val);saveGame();log(`рҹ’ҡ жҒўеӨҚ${opt.val}HP`)}
      else if(opt.action==='healBottle'){state.bag.push({...ITEMS.find(x=>x.name==='е°ҸиҚҜж°ҙ'),uid:Date.now()+Math.random()});log('рҹ§ҙ иҺ·еҫ—е°ҸиҚҜж°ҙ')}
      showScr('Battle');updateUI();saveGame();
    };
    btns.appendChild(btn);
  });
  showScr('Event');
}

// Init
if(!loadGame()){startFloor()}else{updateUI();const scrId=state.curEnemy?'Battle':'Event';showScr(scrId);if(state.curEnemy){showEnemy();if(state.curEnemyHp>0){document.getElementById('btnRoll').classList.remove('hidden');document.getElementById('btnRoll').disabled=false;document.getElementById('btnNextEnemy').classList.add('hidden');document.getElementById('btnNextFloor').classList.add('hidden');document.getElementById('battleResult').classList.add('hidden')}else if(state.enemiesLeft>0){document.getElementById('btnNextEnemy').classList.remove('hidden');document.getElementById('btnRoll').classList.add('hidden')}else{document.getElementById('btnNextFloor').classList.remove('hidden');document.getElementById('btnRoll').classList.add('hidden')}}}
updateUI();
</script>
</body>
</html>{
