<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>鸡你太美 v1.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;font-family:'Segoe UI',sans-serif}
C{display:block;margin:0 auto}
#hud{position:fixed;top:10px;left:10px;color:#fff;font-size:16px;text-shadow:0 0 5px rgba(0,0,0,0.8);z-index:10}
#hud div{margin-bottom:5px}
#startScreen{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#startScreen h1{font-size:48px;color:#ffcc00;text-shadow:0 0 20px #ff6600;margin-bottom:20px}
#startScreen p{color:#aaa;font-size:16px;margin-bottom:30px;text-align:center}
#startScreen button{padding:15px 40px;font-size:20px;background:#ff6600;color:#fff;border:none;border-radius:10px;cursor:pointer;transition:all 0.3s}
#startScreen button:hover{background:#ff8800;transform:scale(1.05)}
#gameOver{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#gameOver h1{font-size:36px;color:#ff4444;margin-bottom:20px}
#gameOver p{color:#fff;font-size:20px;margin-bottom:30px}
#gameOver button{padding:15px 40px;font-size:20px;background:#ff6600;color:#fff;border:none;border-radius:10px;cursor:pointer}
</style>
</head>
<body>
<div id="startScreen">
  <h1>🐔 鸡你太美</h1>
  <p>控制小鸡躲避篮球<br>踩篮球得分！越踩越快！<br><br>方向键/触屏移动</p>
  <button onclick="startGame()">开始游戏</button>
</div>
<div id="gameOver">
  <h1>🐔 被篮球砸死了！</h1>
  <p>得分：<span id="finalScore">0</span></p>
  <button onclick="location.reload()">再来一局</button>
</div>
<div id="hud">
  <div>🐔 得分：<span id="score">0</span></div>
  <div>❤️ 生命：<span id="lives">3</span></div>
  <div>🏀 难度：<span id="diff">1</span></div>
</div>
<canvas id="C"></canvas>
<script>
const C=document.getElementById('C'),X=C.getContext('2d');
let W,H,gameState='start',score=0,lives=3,difficulty=1;
let chicken={x:0,y:0,w:40,h:40,vx:0,vy:0,spd:5,inv:0};
let balls=[],particles=[],frameCount=0,spawnRate=60;
let keys={},touching=false,touchX=0,touchY=0;

function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight;
  chicken.x=W/2;chicken.y=H-100;
}
window.addEventListener('resize',resize);
resize();

// Input
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
});
window.addEventListener('keyup',e=>keys[e.key]=false);
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  touching=true;
  const t=e.touches[0];
  touchX=t.clientX;touchY=t.clientY;
});
C.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];
  touchX=t.clientX;touchY=t.clientY;
});
C.addEventListener('touchend',e=>{touching=false});

function startGame(){
  document.getElementById('startScreen').style.display='none';
  gameState='play';score=0;lives=3;difficulty=1;
  chicken.x=W/2;chicken.y=H-100;chicken.inv=0;
  balls=[];particles=[];frameCount=0;spawnRate=60;
  loop();
}

function spawnBall(){
  const side=Math.random()<0.5;
  const x=side?Math.random()*W:Math.random()*W;
  const y=-30;
  const speed=2+difficulty*0.5+Math.random()*2;
  const angle=Math.random()*Math.PI*2;
  balls.push({
    x,y,vx:Math.cos(angle)*speed*0.3,vy:speed,
    r:20+Math.random()*10,rot:0,rotSpd:(Math.random()-0.5)*0.2,
    color:['#ff6600','#ff8800','#ffaa00','#cc5500'][Math.floor(Math.random()*4)]
  });
}

function addParticles(x,y,color,n){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=Math.random()*5+2;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,color,sz:Math.random()*4+2});
  }
}

function update(){
  frameCount++;
  
  // Difficulty
  difficulty=1+Math.floor(score/500)*0.5;
  spawnRate=Math.max(15,60-Math.floor(score/100)*2);
  document.getElementById('diff').textContent=Math.floor(difficulty*10)/10;
  
  // Spawn balls
  if(frameCount%spawnRate===0)spawnBall();
  
  // Move chicken
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx=-1;
  if(keys['ArrowRight']||keys['d'])dx=1;
  if(keys['ArrowUp']||keys['w'])dy=-1;
  if(keys['ArrowDown']||keys['s'])dy=1;
  
  // Touch input
  if(touching){
    const tdx=touchX-chicken.x,tdy=touchY-chicken.y;
    const dist=Math.hypot(tdx,tdy);
    if(dist>10){dx=tdx/dist;dy=tdy/dist}
  }
  
  // Normalize diagonal
  if(dx&&dy){dx*=0.707;dy*=0.707}
  
  chicken.x+=dx*chicken.spd;
  chicken.y+=dy*chicken.spd;
  
  // Bounds
  chicken.x=Math.max(20,Math.min(W-20,chicken.x));
  chicken.y=Math.max(20,Math.min(H-20,chicken.y));
  
  // Invincibility
  if(chicken.inv>0)chicken.inv--;
  
  // Update balls
  for(let i=balls.length-1;i>=0;i--){
    const b=balls[i];
    b.x+=b.vx;b.y+=b.vy;
    b.vy+=0.05; // Gravity
    b.rot+=b.rotSpd;
    
    // Bounce off walls
    if(b.x<b.r){b.x=b.r;b.vx=Math.abs(b.vx)*0.8}
    if(b.x>W-b.r){b.x=W-b.r;b.vx=-Math.abs(b.vx)*0.8}
    if(b.y>H+b.r*2){balls.splice(i,1);continue}
    
    // Collision with chicken
    const dist=Math.hypot(b.x-chicken.x,b.y-chicken.y);
    if(dist<b.r+15){
      // Check if chicken is above ball (stomping)
      if(chicken.y<b.y-b.r*0.3&&chicken.vy>=-2){
        // Stomp!
        score+=100+Math.floor(difficulty)*50;
        addParticles(b.x,b.y,b.color,15);
        balls.splice(i,1);
        document.getElementById('score').textContent=score;
        // Bounce chicken up
        chicken.vy=-8;
        continue;
      }
      
      // Hit!
      if(chicken.inv<=0){
        lives--;
        chicken.inv=60;
        addParticles(chicken.x,chicken.y,'#ff0',10);
        document.getElementById('lives').textContent=lives;
        if(lives<=0){
          gameState='over';
          document.getElementById('finalScore').textContent=score;
          document.getElementById('gameOver').style.display='flex';
          return;
        }
      }
    }
  }
  
  // Apply gravity to chicken
  chicken.vy+=0.3;
  chicken.y+=chicken.vy;
  if(chicken.y>H-20){chicken.y=H-20;chicken.vy=0}
  
  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }
}

function draw(){
  // Background
  const grad=X.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#1a1a2e');
  grad.addColorStop(1,'#16213e');
  X.fillStyle=grad;
  X.fillRect(0,0,W,H);
  
  // Grid
  X.strokeStyle='rgba(255,255,255,0.05)';
  X.lineWidth=1;
  for(let x=0;x<W;x+=50){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=0;y<H;y+=50){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}
  
  // Draw balls
  for(const b of balls){
    X.save();
    X.translate(b.x,b.y);
    X.rotate(b.rot);
    
    // Ball shadow
    X.fillStyle='rgba(0,0,0,0.3)';
    X.beginPath();X.ellipse(3,3,b.r,b.r*0.3,0,0,Math.PI*2);X.fill();
    
    // Ball body
    X.fillStyle=b.color;
    X.shadowColor=b.color;
    X.shadowBlur=15;
    X.beginPath();X.arc(0,0,b.r,0,Math.PI*2);X.fill();
    
    // Ball lines
    X.strokeStyle='rgba(0,0,0,0.3)';
    X.lineWidth=2;
    X.beginPath();X.arc(0,0,b.r*0.7,0.3,2.8);X.stroke();
    X.beginPath();X.moveTo(-b.r*0.5,-b.r*0.3);X.lineTo(b.r*0.5,b.r*0.3);X.stroke();
    
    // Highlight
    X.fillStyle='rgba(255,255,255,0.3)';
    X.beginPath();X.arc(-b.r*0.3,-b.r*0.3,b.r*0.3,0,Math.PI*2);X.fill();
    
    X.restore();
  }
  
  // Draw chicken
  if(chicken.inv<=0||Math.floor(chicken.inv/4)%2===0){
    X.save();
    X.translate(chicken.x,chicken.y);
    
    // Body shadow
    X.fillStyle='rgba(0,0,0,0.3)';
    X.beginPath();X.ellipse(0,15,18,5,0,0,Math.PI*2);X.fill();
    
    // Body
    X.fillStyle='#fff';
    X.shadowColor='#ffa';
    X.shadowBlur=10;
    X.beginPath();X.ellipse(0,0,15,18,0,0,Math.PI*2);X.fill();
    
    // Wing
    X.fillStyle='#eee';
    X.beginPath();X.ellipse(-10,2,8,12,-0.3,0,Math.PI*2);X.fill();
    
    // Head
    X.fillStyle='#fff';
    X.beginPath();X.arc(0,-18,12,0,Math.PI*2);X.fill();
    
    // Comb (鸡冠)
    X.fillStyle='#ff3333';
    X.beginPath();
    X.moveTo(-5,-28);X.lineTo(0,-35);X.lineTo(5,-28);
    X.lineTo(3,-30);X.lineTo(0,-33);X.lineTo(-3,-30);
    X.closePath();X.fill();
    
    // Eye
    X.fillStyle='#000';
    X.beginPath();X.arc(4,-20,3,0,Math.PI*2);X.fill();
    X.fillStyle='#fff';
    X.beginPath();X.arc(5,-21,1.2,0,Math.PI*2);X.fill();
    
    // Beak (嘴)
    X.fillStyle='#ff8800';
    X.beginPath();
    X.moveTo(10,-18);X.lineTo(20,-15);X.lineTo(10,-12);
    X.closePath();X.fill();
    
    // Wattle (肉垂)
    X.fillStyle='#ff3333';
    X.beginPath();X.ellipse(12,-10,3,5,0,0,Math.PI*2);X.fill();
    
    // Legs
    X.strokeStyle='#ff8800';
    X.lineWidth=3;
    const legOff=Math.sin(frameCount*0.15)*5;
    X.beginPath();X.moveTo(-5,15);X.lineTo(-8,25+legOff);X.stroke();
    X.beginPath();X.moveTo(5,15);X.lineTo(8,25-legOff);X.stroke();
    
    // Foot
    X.beginPath();X.moveTo(-12,25+legOff);X.lineTo(-4,25+legOff);X.stroke();
    X.beginPath();X.moveTo(4,25-legOff);X.lineTo(12,25-legOff);X.stroke();
    
    X.restore();
  }
  
  // Particles
  for(const p of particles){
    X.save();
    X.globalAlpha=p.life/50;
    X.fillStyle=p.color;
    X.shadowColor=p.color;
    X.shadowBlur=5;
    X.beginPath();X.arc(p.x,p.y,p.sz,0,Math.PI*2);X.fill();
    X.restore();
  }
  
  // Score popup effect
  if(frameCount%60<30){
    X.save();
    X.font='bold 14px sans-serif';
    X.fillStyle='rgba(255,200,0,'+(1-frameCount%60/30)+')';
    X.textAlign='center';
    X.fillText('踩！+100',chicken.x,chicken.y-40-Math.sin(frameCount*0.1)*5);
    X.restore();
  }
}

function loop(){
  if(gameState!=='play')return;
  update();
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
